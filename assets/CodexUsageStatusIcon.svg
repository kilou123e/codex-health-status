<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="180" y1="120" x2="860" y2="920" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#20282a"/>
      <stop offset="1" stop-color="#101314"/>
    </linearGradient>
    <linearGradient id="usage" x1="218" y1="760" x2="806" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#df4e45"/>
      <stop offset="0.52" stop-color="#b6a45e"/>
      <stop offset="1" stop-color="#36cf7a"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="210" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="104" y="104" width="816" height="816" rx="178" fill="none" stroke="#e8ebd5" stroke-width="22" opacity="0.92"/>
  <rect x="152" y="154" width="720" height="24" rx="12" fill="#4bd0b6"/>

  <!-- Pixel cat -->
  <g shape-rendering="crispEdges">
    <rect x="292" y="252" width="64" height="128" fill="#81cf62"/>
    <rect x="668" y="252" width="64" height="128" fill="#81cf62"/>
    <rect x="356" y="316" width="312" height="64" fill="#81cf62"/>
    <rect x="244" y="380" width="536" height="248" fill="#81cf62"/>
    <rect x="308" y="628" width="96" height="64" fill="#81cf62"/>
    <rect x="620" y="628" width="96" height="64" fill="#81cf62"/>
    <rect x="340" y="540" width="344" height="64" fill="#f3edc6"/>
    <rect x="372" y="444" width="64" height="64" fill="#111719"/>
    <rect x="588" y="444" width="64" height="64" fill="#111719"/>
    <rect x="480" y="540" width="64" height="64" fill="#111719"/>
    <rect x="180" y="476" width="64" height="64" fill="#81cf62"/>
    <rect x="780" y="476" width="64" height="64" fill="#81cf62"/>
  </g>

  <!-- Usage bar -->
  <rect x="218" y="734" width="588" height="70" rx="35" fill="#343d3d"/>
  <rect x="218" y="734" width="382" height="70" rx="35" fill="url(#usage)"/>
  <rect x="218" y="734" width="588" height="70" rx="35" fill="none" stroke="#e8ebd5" stroke-width="10" opacity="0.45"/>

  <!-- Pixel spark -->
  <g fill="#e8ebd5" opacity="0.92" shape-rendering="crispEdges">
    <rect x="768" y="244" width="34" height="34"/>
    <rect x="802" y="278" width="34" height="34"/>
    <rect x="734" y="278" width="34" height="34"/>
    <rect x="768" y="312" width="34" height="34"/>
  </g>
</svg>
